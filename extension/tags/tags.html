<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GOG Enhancer — Tag Dashboard</title>
  <link rel="stylesheet" href="tags.css" />
</head>
<body>
  <header class="hero">
    <div class="hero-inner">
      <div class="hero-brand">
        <span class="brand-pill">GOG Enhancer</span>
        <span class="hero-version">tag dashboard</span>
      </div>
      <h1>Your tags &amp; notes</h1>
      <p class="hero-sub">
        Every game you've tagged or written notes about. Click a tag on the
        left to filter, or search by name.
      </p>
      <div class="toolbar">
        <input type="search" id="search" placeholder="Search… or use tag:X, lowest:<10, since:2026, snapshots:>5" autocomplete="off" title="Advanced filters: tag:rpg lowest:<10 lowest:>5 snapshots:>3 since:2026 — combine freely with plain text" />
        <select id="sortBy" class="toolbar-select" title="Sort games by…">
          <option value="name">Name</option>
          <option value="lastVisit">Last visit</option>
          <option value="tagCount">Tag count</option>
          <option value="snapshots">Snapshot count</option>
        </select>
        <span class="counts" id="counts"></span>
        <button id="densityToggle" class="ghost" type="button" title="Toggle compact / comfortable density">⇅ Density</button>
        <button id="exportCsv" class="ghost">↓ CSV</button>
        <button id="exportPack" class="ghost" type="button" title="Export the currently-visible games as a shareable JSON pack">📦 Pack ↓</button>
        <button id="importPack" class="ghost" type="button" title="Import a pack JSON from another user">📦 Pack ↑</button>
        <input type="file" id="importPackFile" accept="application/json,.json" hidden />
      </div>
    </div>
  </header>

  <section class="stats-panel" id="statsPanel" aria-label="Library statistics"></section>
  <section class="year-review" id="yearReview" aria-label="Year in review"></section>
  <section class="sale-heatmap" id="saleHeatmap" aria-label="Sale calendar heatmap"></section>

  <main class="layout">
    <aside class="sidebar">
      <h2>All tags</h2>
      <div id="tagList" class="tag-list-vertical">
        <p class="empty-msg">Loading…</p>
      </div>
    </aside>

    <section class="games">
      <div id="gameList" class="game-list">
        <p class="empty-msg">Loading…</p>
      </div>
    </section>
  </main>

  <script src="../lib/defaults.js"></script>
  <script src="../lib/i18n.js"></script>
  <script src="../lib/storage.js"></script>
  <script src="tags.js"></script>
</body>
</html>

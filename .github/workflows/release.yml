name: release

on:
  push:
    tags:
      - "v*.*.*"

# The workflow needs write access to create the Release.
permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches manifest.json version
        shell: pwsh
        run: |
          $manifestVersion = (Get-Content manifest.json -Raw | ConvertFrom-Json).version
          $tagVersion = "${{ github.ref_name }}".TrimStart("v")
          if ($manifestVersion -ne $tagVersion) {
            Write-Error "Tag $tagVersion does not match manifest.json version $manifestVersion."
            exit 1
          }
          Write-Output "Tag v$tagVersion matches manifest.json — proceeding."

      - name: Build extension zip
        shell: pwsh
        run: ./build.ps1

      - name: Extract changelog section from README
        id: changelog
        shell: bash
        run: |
          TARGET="### ${{ github.ref_name }}"
          NOTES=$(awk -v target="$TARGET" '
            /^### v/ {
              if (matched) exit
              if (index($0, target) == 1) matched=1
            }
            matched
          ' README.md)
          if [ -z "$NOTES" ]; then
            echo "::warning::No changelog section found for ${{ github.ref_name }} in README.md — falling back to generated notes."
            echo "fallback=true" >> "$GITHUB_OUTPUT"
          else
            {
              echo "notes<<CHANGELOG_EOF"
              echo "$NOTES"
              echo ""
              echo "---"
              echo "_Download \`gog-enhancer-webstore.zip\` below and load it as an unpacked extension, or wait for the Chrome Web Store listing._"
              echo "CHANGELOG_EOF"
            } >> "$GITHUB_OUTPUT"
            echo "fallback=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.notes }}
          generate_release_notes: ${{ steps.changelog.outputs.fallback == 'true' }}
          files: gog-enhancer-webstore.zip
          fail_on_unmatched_files: true
